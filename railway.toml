# Railway: 저장소 연결 시 Root Directory = SAP_SaaS_Platform
# Postgres 플러그인 추가 후 DATABASE_URL 참조. 웹에서 내부 DNS가 안 될 때는
# DATABASE_PUBLIC_URL(또는 전체 공개 URL)을 함께 설정하세요. (app/database.py 참고)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Procfile/Dashboard가 uvicorn을 직접 호출하면 $PORT 가 확장되지 않음 → sh -c 필수
startCommand = "sh -c 'exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
