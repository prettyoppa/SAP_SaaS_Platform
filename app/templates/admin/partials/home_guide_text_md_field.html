{# 단일 Markdown textarea — 상단 KO/EN 토글과 연동 (hidden ko/en) #}
<div class="col-12" data-home-guide-text-md-root>
  <label class="form-label small">
    <span class="nav-ko">사용 안내 텍스트 (Markdown)</span>
    <span class="nav-en" style="display:none">Getting-started text (Markdown)</span>
  </label>
  <input type="hidden" name="home_guide_text_md" data-home-guide-text-ko
         value="{{ settings.get('home_guide_text_md', '') }}"/>
  <input type="hidden" name="home_guide_text_md_en" data-home-guide-text-en
         value="{{ settings.get('home_guide_text_md_en', '') }}"/>
  <textarea class="form-control font-monospace" rows="{{ field_rows|default(8) }}" data-home-guide-text-editor
            placeholder="# SAP development with AI…"></textarea>
  <div class="form-text">
    <span class="home-guide-text-lang-hint-ko nav-ko">
      상단 <strong>한국어/English</strong> 전환에 따라 KO·EN 본문이 바뀝니다. 입력 시 동영상보다 우선·서식 유지 펼침(블록당 약 1초, 완료 후 10초 유지).
    </span>
    <span class="home-guide-text-lang-hint-en nav-en" style="display:none">
      Use the header <strong>KO/EN</strong> toggle to edit each locale. Overrides video when set.
    </span>
  </div>
</div>
