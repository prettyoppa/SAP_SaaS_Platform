{# 단일 평문 textarea — KO/EN은 name 있는 숨김 textarea에 보관(줄바꿈·따옴표 안전, JS 없이도 저장값 유지) #}
<div class="col-12" data-bilingual-admin-root>
  <label class="form-label small">
    <span class="nav-ko">사용 안내 텍스트</span>
    <span class="nav-en" style="display:none">Getting-started text</span>
  </label>
  <textarea name="home_guide_text_md" class="d-none" rows="1" data-bilingual-ko aria-hidden="true" tabindex="-1">{{ settings.get('home_guide_text_md', '') }}</textarea>
  <textarea name="home_guide_text_md_en" class="d-none" rows="1" data-bilingual-en aria-hidden="true" tabindex="-1">{{ settings.get('home_guide_text_md_en', '') }}</textarea>
  <textarea class="form-control" rows="{{ field_rows|default(8) }}" data-bilingual-editor>{{ settings.get('home_guide_text_md', '') }}</textarea>
  <div class="form-text">
    <span class="home-guide-text-lang-hint-ko nav-ko">
      상단 <strong>한국어/English</strong> 전환에 따라 KO·EN 본문이 바뀝니다. 입력 시 동영상보다 우선·한 글자씩 타이핑(완료 후 10초 유지).
    </span>
    <span class="home-guide-text-lang-hint-en nav-en" style="display:none">
      Use the header <strong>KO/EN</strong> toggle. Plain text only; types character by character on the home panel. Overrides video when set.
    </span>
  </div>
</div>
