{# expects: field_id, ko_name, en_name, ko_value, en_value, label_ko, label_en, input_type ('textarea'|'input'), rows, placeholder_ko, placeholder_en, hint_ko, hint_en #}
<div class="col-12{% if col_class %} {{ col_class }}{% endif %}" data-bilingual-admin-root>
  <label class="form-label small">
    <span class="nav-ko">{{ label_ko }}</span>
    <span class="nav-en" style="display:none">{{ label_en }}</span>
  </label>
  <textarea name="{{ ko_name }}" class="d-none" rows="1" data-bilingual-ko aria-hidden="true" tabindex="-1">{{ ko_value }}</textarea>
  <textarea name="{{ en_name }}" class="d-none" rows="1" data-bilingual-en aria-hidden="true" tabindex="-1">{{ en_value }}</textarea>
  {% if input_type == 'textarea' %}
  <textarea class="form-control" rows="{{ rows|default(4) }}" data-bilingual-editor placeholder="{{ placeholder_ko }}">{{ ko_value }}</textarea>
  {% else %}
  <input type="text" class="form-control" data-bilingual-editor value="{{ ko_value }}" placeholder="{{ placeholder_ko }}"/>
  {% endif %}
  {% if hint_ko or hint_en %}
  <div class="form-text">
    <span class="nav-ko">{{ hint_ko }}</span>
    <span class="nav-en" style="display:none">{{ hint_en }}</span>
  </div>
  {% endif %}
</div>
