{% if can_operate_delivery|default(false) %}
<div class="alert alert-warning border mb-3">
  <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
    <form method="post" action="/admin/abap-analysis/{{ row.id }}/delivery/fs-start" class="d-inline"
          data-busy-agents='[{"agentKo":"「FS설계」","doingKo":"분석·제안서를 바탕으로 기능명세(FS)를 작성하고 있습니다","agentEn":"「FS Design」","doingEn":"drafting the functional specification from analysis and proposal"}]'>
      <button type="submit" class="btn btn-sm btn-warning" {% if ana_fs_busy|default(false) or not can_start_fs|default(false) %}disabled{% endif %}>
        {% if ana_fs_stat|default('none') == 'ready' and ana_fs_html|default('') %}FS 재생성{% else %}FS 생성 시작{% endif %}
      </button>
    </form>
    <form method="post" action="/admin/abap-analysis/{{ row.id }}/delivery/code-start" class="d-inline"
          data-busy-agents='[{"agentKo":"「ABAP」","doingKo":"기능명세를 바탕으로 납품 ABAP 초안을 작성하고 있습니다","agentEn":"「ABAP」","doingEn":"drafting delivered ABAP from the FS"},{"agentKo":"「코드검수」","doingKo":"초안을 검토·보완하고 있습니다","agentEn":"「Code Review」","doingEn":"reviewing and refining the draft"},{"agentKo":"「테스트」","doingKo":"단위 테스트 시나리오를 작성하고 있습니다","agentEn":"「Test」","doingEn":"writing unit test scenarios"}]'>
      <button type="submit" class="btn btn-sm btn-primary" {% if ana_dc_busy|default(false) or not can_start_delivered_code|default(false) %}disabled{% endif %}>
        {% if has_delivered_preview|default(false) %}개발코드 재생성{% else %}개발코드 생성 시작{% endif %}
      </button>
    </form>
  </div>
  <p class="small text-muted mb-0">매칭된 컨설턴트가 FS·납품 ABAP을 생성합니다. 다른 화면으로 이동해도 서버에서 계속됩니다.{% if not can_start_fs|default(false) %} 제안서가 준비된 뒤 FS를 시작할 수 있습니다.{% endif %}</p>
</div>
{% endif %}
