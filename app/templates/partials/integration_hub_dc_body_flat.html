{% if dc_stat == 'failed' %}
<div class="alert alert-danger small mb-3">
  <div class="fw-semibold mb-1">구현 산출물 생성 실패</div>
  <pre class="mb-0 small text-wrap" style="white-space:pre-wrap;">{{ ir.delivered_code_error or '알 수 없는 오류' }}</pre>
</div>
{% elif delivered_code_html %}
<div class="proposal-body proposal-prose border rounded p-3" style="background:var(--surface2);border-color:var(--border)!important;">
  {{ delivered_code_html | safe }}
</div>
{% else %}
<p class="text-muted small mb-0">구현 가이드(마크다운)가 아직 없습니다. FS가 준비되면 관리자가 생성을 시작할 수 있습니다.</p>
{% endif %}
