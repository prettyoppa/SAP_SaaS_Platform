<div class="ia-start-sheet ia-request-type-sheet" id="iaRequestTypeSheet" hidden>
  <div class="ia-start-sheet__backdrop" data-ia-request-sheet-close tabindex="-1" aria-hidden="true"></div>
  <div class="ia-start-sheet__panel ia-start-sheet__panel--picker" id="iaRequestTypeSheetPanel" role="dialog" aria-modal="true" aria-labelledby="iaRequestTypeSheetTitle" tabindex="-1">
    <div class="ia-start-sheet__handle" aria-hidden="true"></div>
    <h2 class="ia-start-sheet__title nav-ko" id="iaRequestTypeSheetTitle">어떤 도움이 필요하세요?</h2>
    <h2 class="ia-start-sheet__title nav-en" style="display:none">What do you need help with?</h2>

    <div class="ia-start-sheet__options">
      <a href="/rfp/new" class="ia-sheet-option">
        <span class="ia-sheet-option__icon ia-sheet-option__icon--fa ia-sheet-option__icon--dev" aria-hidden="true"><i class="fa-solid fa-code"></i></span>
        <span class="ia-sheet-option__body">
          <span class="ia-sheet-option__label nav-ko">새로운 ABAP 프로그램 개발</span>
          <span class="ia-sheet-option__label nav-en" style="display:none">New ABAP program development</span>
          <span class="ia-sheet-option__hint nav-ko">신규 개발 (ABAP)</span>
          <span class="ia-sheet-option__hint nav-en" style="display:none">New development (ABAP)</span>
        </span>
        <i class="fa-solid fa-chevron-right ia-sheet-option__chevron" aria-hidden="true"></i>
      </a>
      <a href="/abap-analysis/new" class="ia-sheet-option">
        <span class="ia-sheet-option__icon ia-sheet-option__icon--fa ia-sheet-option__icon--analysis" aria-hidden="true"><i class="fa-solid fa-hospital"></i></span>
        <span class="ia-sheet-option__body">
          <span class="ia-sheet-option__label nav-ko">기존 프로그램 오류 분석·로직 개선</span>
          <span class="ia-sheet-option__label nav-en" style="display:none">Existing program error analysis &amp; logic improvement</span>
          <span class="ia-sheet-option__hint nav-ko">분석·개선</span>
          <span class="ia-sheet-option__hint nav-en" style="display:none">Analysis &amp; improvement</span>
        </span>
        <i class="fa-solid fa-chevron-right ia-sheet-option__chevron" aria-hidden="true"></i>
      </a>
      <a href="/integration/new" class="ia-sheet-option">
        <span class="ia-sheet-option__icon ia-sheet-option__icon--fa ia-sheet-option__icon--integration" aria-hidden="true"><i class="fa-solid fa-link"></i></span>
        <span class="ia-sheet-option__body">
          <span class="ia-sheet-option__label nav-ko">SAP 호출 외부 툴 개발</span>
          <span class="ia-sheet-option__label nav-en" style="display:none">External tools invoked from SAP</span>
          <span class="ia-sheet-option__hint nav-ko">연동 개발</span>
          <span class="ia-sheet-option__hint nav-en" style="display:none">Integration</span>
        </span>
        <i class="fa-solid fa-chevron-right ia-sheet-option__chevron" aria-hidden="true"></i>
      </a>
    </div>

    <button type="button" class="ia-start-sheet__close" data-ia-request-sheet-close aria-label="Close">
      <span class="nav-ko">닫기</span>
      <span class="nav-en" style="display:none">Close</span>
    </button>
  </div>
</div>
