{# 히어로 왼쪽: 제목(최대 2줄·<br>) · 서브카피 · 부제(설명) #}
{% set hero_copy = settings | home_hero_fields %}
<div class="home-hero-marketing">
  {% if hero_copy.title_markup %}
  <h1 class="hero-title">{{ hero_copy.title_markup }}</h1>
  {% endif %}
  {% if hero_copy.subcopy %}
  <p class="hero-subcopy" data-i18n="hero.powerAgents">{{ hero_copy.subcopy }}</p>
  {% endif %}
  {% if hero_copy.desc %}
  <p class="hero-desc">{{ hero_copy.desc }}</p>
  {% endif %}
</div>
