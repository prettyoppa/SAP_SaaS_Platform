{% if settlement_show_phase|default(false) %}
<details class="interview-summary-toggle rfp-hub-phase mb-3" id="{{ settlement_phase_anchor }}"
  {% if hub_phase_open|default('') == 'settlement' %}open{% endif %}>
  <summary class="interview-summary-header w-100 d-flex flex-wrap align-items-center gap-2">
    <i class="fa-solid fa-hand-holding-dollar hub-settlement-phase-icon me-1" aria-hidden="true"></i>
    <span class="fw-semibold"><span data-i18n="hub.phaseSettlement">납품·대금</span></span>
    {% if settlement_status == 'payable' %}
    <span class="badge bg-warning text-dark ms-1" data-i18n="settlement.badgePayable">지급 대기</span>
    {% elif settlement_status == 'payout_completed' %}
    <span class="badge bg-success ms-1" data-i18n="settlement.badgeDone">지급 완료</span>
    {% elif settlement_status == 'funded' %}
    <span class="badge bg-info text-dark ms-1" data-i18n="settlement.badgeFunded">입금 완료</span>
    {% endif %}
    <span class="rfp-hub-phase-chevron" aria-hidden="true"><i class="fa-solid fa-chevron-down small"></i></span>
  </summary>
  <div class="rfp-hub-phase-body">
    {% include 'partials/hub_project_settlement_panel.html' %}
  </div>
</details>
{% endif %}
