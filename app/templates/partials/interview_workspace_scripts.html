<script src="/static/js/interview_suggestion_ui.js?v=20260529suggest"></script>
<script>
(function () {
  var UI = window.InterviewSuggestionUI;
  function buildPayload() {
    var ta = document.getElementById('seq-answer-input');
    var free = ta ? (ta.value || '').trim() : '';
    if (UI) {
      var p = UI.buildPayloadFromRows(document.querySelectorAll('.interview-suggestion-row'));
      p.free = free;
      return p;
    }
    return { v: 1, like: [], dislike: [], free: free };
  }
  function isPayloadValid(p) {
    if (!UI) {
      if (!p) return false;
      var text = '';
      if (p.like && p.like.length) text += p.like.join(' ');
      if (p.dislike && p.dislike.length) text += p.dislike.join(' ');
      if (p.free) text += p.free;
      return text.replace(/\s/g, '').length >= 2;
    }
    var groups = UI.parseJsonEl('answer-suggestion-groups-data') || [];
    var enabledEl = UI.parseJsonEl('interview-suggestion-groups-enabled');
    var groupsEnabled = enabledEl === true || enabledEl === 'true';
    return !UI.validatePayload(p, groupsEnabled ? groups : null, (document.getElementById('seq-answer-input') || {}).value || '');
  }
  function syncHiddenPayload() {
    var hid = document.getElementById('answer-payload-json');
    if (hid) hid.value = JSON.stringify(buildPayload());
  }
  function alertForValidation() {
    if (!UI) {
      alert('좋아요·싫어요로 선택하거나, 보충/추가 란에 답을 입력해 주세요. (임시저장은 AI에게 문의 버튼 바로 위)');
      return;
    }
    var p = buildPayload();
    var groups = UI.parseJsonEl('answer-suggestion-groups-data') || [];
    var enabledEl = UI.parseJsonEl('interview-suggestion-groups-enabled');
    var groupsEnabled = enabledEl === true || enabledEl === 'true';
    var ta = document.getElementById('seq-answer-input');
    var code = UI.validatePayload(p, groupsEnabled ? groups : null, ta ? ta.value : '');
    alert(UI.alertForCode(code || 'empty'));
  }

  const form = document.getElementById('iv-answer-form');
  const hiddenAns = document.getElementById('answers-combined');
  const saveExitForm = document.getElementById('save-exit-form');
  const seqIn = document.getElementById('seq-answer-input');

  if (saveExitForm) {
    saveExitForm.addEventListener('submit', function () {
      var h = document.getElementById('save-exit-answer');
      var hp = document.getElementById('save-exit-payload');
      var ta = document.getElementById('seq-answer-input');
      syncHiddenPayload();
      if (h) h.value = ta ? (ta.value || '').trim() : '';
      if (hp) {
        var ap = document.getElementById('answer-payload-json');
        hp.value = ap ? ap.value : JSON.stringify(buildPayload());
      }
    });
  }
  var floatSave = document.getElementById('interview-draft-save-float');
  if (floatSave && saveExitForm) {
    floatSave.addEventListener('click', function () {
      var h = document.getElementById('save-exit-answer');
      var hp = document.getElementById('save-exit-payload');
      var ta = document.getElementById('seq-answer-input');
      syncHiddenPayload();
      if (h) h.value = ta ? (ta.value || '').trim() : '';
      if (hp) {
        var ap = document.getElementById('answer-payload-json');
        hp.value = ap ? ap.value : JSON.stringify(buildPayload());
      }
      if (typeof saveExitForm.requestSubmit === 'function') {
        saveExitForm.requestSubmit();
      } else {
        saveExitForm.submit();
      }
    });
  }

  const seqForm = document.getElementById('iv-seq-form');
  const seqBtn = document.getElementById('seq-next-btn');
  var suggHost = document.getElementById('answer-suggestion-rows');
  if (UI && suggHost && seqIn) {
    var flatItems = UI.parseJsonEl('answer-suggestions-data') || [];
    var groups = UI.parseJsonEl('answer-suggestion-groups-data') || [];
    var enabledEl = UI.parseJsonEl('interview-suggestion-groups-enabled');
    var groupsEnabled = enabledEl === true || enabledEl === 'true';
    var draft = UI.parseJsonEl('interview-draft-payload') || { v: 1, like: [], dislike: [], free: '' };
    if ((groupsEnabled && groups.length) || (flatItems && flatItems.length)) {
      UI.mount({
        hostId: 'answer-suggestion-rows',
        groupsEnabled: groupsEnabled,
        groups: groups,
        flatItems: flatItems,
        draft: draft,
        onSync: syncHiddenPayload,
      });
    }
  }
  if (seqIn) {
    seqIn.addEventListener('input', function () { syncHiddenPayload(); });
  }
  syncHiddenPayload();

  try {
    var params = new URLSearchParams(window.location.search);
    var ansCode = params.get('ans');
    if (ansCode && UI) {
      alert(UI.alertForCode(ansCode));
      params.delete('ans');
      var qs = params.toString();
      var next = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
      window.history.replaceState({}, '', next);
    } else if (ansCode === 'empty') {
      alertForValidation();
      params.delete('ans');
      var qs2 = params.toString();
      window.history.replaceState({}, '', window.location.pathname + (qs2 ? '?' + qs2 : '') + window.location.hash);
    }
  } catch (eAns) {}

  if (seqForm && seqBtn) {
    seqForm.addEventListener('submit', function (e) {
      syncHiddenPayload();
      if (!isPayloadValid(buildPayload())) {
        e.preventDefault();
        alertForValidation();
        return;
      }
      seqBtn.disabled = true;
      seqBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>생성 중...';
    });
  }

  if (!form || !hiddenAns) return;
  const blocks = document.querySelectorAll('.seq-q-block');
  const nextBtns = document.querySelectorAll('.seq-next-btn');
  const submitBtn = document.getElementById('answer-btn');
  nextBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      const block = btn.closest('.seq-q-block');
      if (!block) return;
      const next = block.nextElementSibling;
      if (next && next.classList.contains('seq-q-block')) {
        next.classList.remove('d-none');
        next.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        const ta = next.querySelector('.seq-answer-input');
        if (ta) ta.focus();
        const afterNext = next.nextElementSibling;
        if (!afterNext || !afterNext.classList.contains('seq-q-block')) {
          if (submitBtn) submitBtn.classList.remove('d-none');
        }
      }
    });
  });
  if (blocks.length === 1 && submitBtn) submitBtn.classList.remove('d-none');
  form.addEventListener('submit', function (e) {
    const parts = [];
    document.querySelectorAll('.seq-answer-input').forEach(function (ta, i) {
      parts.push('Q' + (i + 1) + ':\n' + (ta.value || '').trim());
    });
    hiddenAns.value = parts.join('\n\n');
    if (!hiddenAns.value.trim()) {
      e.preventDefault();
      alert('답변을 한 글자 이상 입력해 주세요.');
      return;
    }
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>제출 중...';
    }
  });
})();
</script>
