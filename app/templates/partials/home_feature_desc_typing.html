{# expects desc_ko, desc_en (plain or light markdown) #}
{% set has_desc = (desc_ko|home_guide_has_text) or (desc_en|home_guide_has_text) %}
{% if has_desc %}
<div class="home-feature-desc home-feature-desc--reveal text-muted small" data-home-typing-text data-typing-mode="reveal" role="region">
  <div class="home-guide-text-viewport">
    <div class="home-guide-text-lines" aria-live="polite"></div>
  </div>
  <script type="application/json" class="home-typing-bundle">{{ {'ko': desc_ko, 'en': desc_en} | home_tile_desc_bundle | tojson }}</script>
</div>
{% else %}
<div class="home-feature-desc home-feature-desc--empty" aria-hidden="true"></div>
{% endif %}
