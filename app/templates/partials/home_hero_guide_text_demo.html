{# 사용 안내 평문 — 한 글자씩 타이핑 (KO/EN), 홈 타일 타이틀과 동일 서체 #}
<div class="home-guide-video-stage home-guide-video-stage--text-demo" data-home-typing-text role="img"
     aria-label="{% if settings.get('home_tile_guide_title_ko') %}{{ settings.get('home_tile_guide_title_ko') }}{% else %}사용 안내{% endif %}">

    <div class="home-guide-code-titlebar">
      <span class="home-guide-code-dot home-guide-code-dot--r" aria-hidden="true"></span>
