<script>
(function () {
  var interviewReveal = document.getElementById('interviewAnswerEditReveal');
  if (interviewReveal) {
    interviewReveal.addEventListener('click', function () {
      var dock = document.getElementById('interviewSummaryEditDock');
      if (dock) dock.classList.toggle('d-none');
      document.querySelectorAll('.summary-edit-round').forEach(function (b) {
        b.classList.toggle('d-none');
      });
    });
  }

  window.openSummaryEdit = function (i) {
    var v = document.getElementById('sum-view-' + i);
    var e = document.getElementById('sum-edit-' + i);
    if (v) v.classList.add('d-none');
    if (e) e.classList.remove('d-none');
  };
  window.cancelSummaryEdit = function (i) {
    var v = document.getElementById('sum-view-' + i);
    var e = document.getElementById('sum-edit-' + i);
    if (v) v.classList.remove('d-none');
    if (e) e.classList.add('d-none');
  };
})();
</script>
