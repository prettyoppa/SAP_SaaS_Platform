{# 코드 갤러리 상세와 동일 UX — 섹션 1개여도 탭 표시. context: source_sections [{tab_label, code}], tabs_id #}
{% if source_sections and source_sections|length > 0 %}
<ul class="nav nav-tabs codelib-source-tabs px-3 pt-2" id="{{ tabs_id|default('ref-src-tabs') }}" role="tablist"
    style="background:var(--surface2);border-bottom:1px solid var(--border)">
  {% for sec in source_sections %}
  <li class="nav-item" role="presentation">
    <button class="nav-link codelib-src-tab-btn {% if loop.first %}active{% endif %} small py-2 px-3"
            id="{{ tabs_id|default('ref-src-tabs') }}-btn-{{ loop.index }}"
            data-bs-toggle="tab"
            data-bs-target="#{{ tabs_id|default('ref-src-tabs') }}-pane-{{ loop.index }}"
            type="button" role="tab"
            aria-controls="{{ tabs_id|default('ref-src-tabs') }}-pane-{{ loop.index }}"
            aria-selected="{% if loop.first %}true{% else %}false{% endif %}">
      <i class="fa-solid fa-file-code me-1 codelib-tab-ic"></i>
      <span class="font-monospace text-start">{{ sec.tab_label }}</span>
      {% set _line_n = (sec.code or '').splitlines()|length %}
      <span class="ms-1 codelib-tab-meta">
        <span class="nav-ko">({{ _line_n }}줄)</span>
        <span class="nav-en" style="display:none">({{ _line_n }} lines)</span>
      </span>
    </button>
  </li>
  {% endfor %}
</ul>
<div class="tab-content">
  {% for sec in source_sections %}
  <div class="tab-pane fade {% if loop.first %}show active{% endif %}"
       id="{{ tabs_id|default('ref-src-tabs') }}-pane-{{ loop.index }}" role="tabpanel"
       aria-labelledby="{{ tabs_id|default('ref-src-tabs') }}-btn-{{ loop.index }}">
    <pre class="codelib-source-pre rounded-0 mb-0"><code>{{ sec.code }}</code></pre>
  </div>
  {% endfor %}
</div>
{% endif %}
