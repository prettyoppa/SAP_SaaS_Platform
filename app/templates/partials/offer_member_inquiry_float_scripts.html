{% if offer_member_inquiry is defined and offer_member_inquiry and offer_member_inquiry.enabled %}
<script>
(function () {
  var fid = {{ offer_member_inquiry.float_id | tojson }};

  function stackOfferMemberInquiryFloat() {
    var memberRoot = document.getElementById(fid);
    if (!memberRoot || memberRoot.dataset.memberInquiryStacked === '1') return memberRoot;
    var aiRoot = null;
    document.querySelectorAll('.abap-float-chat').forEach(function (el) {
      if (el !== memberRoot && !aiRoot) aiRoot = el;
    });
    if (!aiRoot) return memberRoot;
    memberRoot.dataset.memberInquiryStacked = '1';
    var panel = document.getElementById(fid + 'Panel');
    var launcher = document.getElementById(fid + 'Launcher');
    var aiLauncher = aiRoot.querySelector('.abap-float-chat-launcher');
    if (panel) aiRoot.insertBefore(panel, aiRoot.firstChild);
    if (launcher && aiLauncher) aiRoot.insertBefore(launcher, aiLauncher);
    memberRoot.remove();
    return aiRoot;
  }

  function bootOfferMemberInquiryFloat() {
    stackOfferMemberInquiryFloat();
    var panel = document.getElementById(fid + 'Panel');
    var launcher = document.getElementById(fid + 'Launcher');
    var closeBtn = document.getElementById(fid + 'Close');
    if (!panel || !launcher) return;
    if (launcher.dataset.memberInquiryBooted === '1') return;
    launcher.dataset.memberInquiryBooted = '1';

    var selectEl = panel.querySelector('[data-offer-member-inquiry-select]');
    var activeOfferId = {{ offer_member_inquiry.default_offer_id | tojson }};
    var resizeApi = typeof window.initAbapFloatChatResize === 'function'
      ? window.initAbapFloatChatResize({
          panel: panel,
          sizeKey: {{ offer_member_inquiry.size_key | tojson }},
          panelGrip: document.getElementById(fid + 'Resize'),
        })
      : null;
    if (resizeApi) resizeApi.loadStoredSizeIfAny();

    function memberInquiryPlaceholderTemplate() {
      if (typeof window.t === 'function') {
        var translated = window.t('memberInquiry.composePlaceholderTo');
        if (translated) return translated;
      }
      var lang = 'ko';
      try { lang = localStorage.getItem('lang') || lang; } catch (e) {}
      return lang === 'en' ? 'Message for {email}…' : '{email} 에게 전달할 내용을 입력하세요.';
    }

    function memberInquiryMsgPlaceholder(ta) {
      if (!ta) return;
      var email = (ta.getAttribute('data-recipient-email') || '').trim();
      var fallbackKey = ta.getAttribute('data-i18n-placeholder');
      if (email) {
        ta.placeholder = memberInquiryPlaceholderTemplate().replace(/\{email\}/g, email);
        return;
      }
      if (fallbackKey && typeof window.t === 'function') {
        var fallback = window.t(fallbackKey);
        if (fallback) ta.placeholder = fallback;
      }
    }

    function updateMemberInquiryMsgPlaceholders(root) {
      if (!root) return;
      root.querySelectorAll('.offer-member-inquiry-msg').forEach(memberInquiryMsgPlaceholder);
    }

    function showOfferThread(offerId) {
      activeOfferId = String(offerId);
      panel.querySelectorAll('[data-offer-member-inquiry-thread]').forEach(function (el) {
        if (el.getAttribute('data-offer-member-inquiry-thread') === activeOfferId) el.removeAttribute('hidden');
        else el.setAttribute('hidden', '');
      });
      panel.querySelectorAll('[data-offer-member-inquiry-compose]').forEach(function (el) {
        if (el.getAttribute('data-offer-member-inquiry-compose') === activeOfferId) el.removeAttribute('hidden');
        else el.setAttribute('hidden', '');
      });
      if (resizeApi) resizeApi.clampPanelToViewport();
    }

    if (selectEl) {
      selectEl.addEventListener('change', function () { showOfferThread(selectEl.value); });
    } else if (activeOfferId != null) {
      showOfferThread(activeOfferId);
    }
    updateMemberInquiryMsgPlaceholders(panel);
    document.addEventListener('app:langchange', function () {
      var p = document.getElementById(fid + 'Panel');
      if (p) updateMemberInquiryMsgPlaceholders(p);
    });

    function openPanel() {
      panel.removeAttribute('hidden');
      launcher.setAttribute('aria-expanded', 'true');
      if (resizeApi) {
        resizeApi.loadStoredSizeIfAny();
        resizeApi.clampPanelToViewport();
      }
      if (typeof window.scrollAiChatPanelToEnd === 'function') window.scrollAiChatPanelToEnd(panel);
    }
    function closePanel() {
      panel.setAttribute('hidden', '');
      launcher.setAttribute('aria-expanded', 'false');
      if (resizeApi) resizeApi.scheduleSaveSize();
    }
    function togglePanel() {
      if (panel.hasAttribute('hidden')) openPanel();
      else closePanel();
    }

    launcher.addEventListener('click', function (e) { e.stopPropagation(); togglePanel(); });
    if (closeBtn) closeBtn.addEventListener('click', function () { closePanel(); });

    function shouldAutoOpen() {
      if (window.location.hash === '#offer-member-inquiry') return true;
      try {
        var p = new URLSearchParams(window.location.search);
        return p.has('offer_inquiry_ok') || p.has('offer_inquiry_err')
          || p.has('offer_inquiry_reply_ok') || p.has('offer_inquiry_reply_err');
      } catch (e) { return false; }
    }
    if (shouldAutoOpen()) openPanel();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootOfferMemberInquiryFloat);
  } else {
    bootOfferMemberInquiryFloat();
  }
})();
</script>
{% endif %}
