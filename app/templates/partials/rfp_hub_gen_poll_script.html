{% if gen_busy %}
<script>
(function () {
  const rfpId = {{ rfp.id }};
  const statusUrl = '/rfp/' + rfpId + '/paid-generation-status';
  const fsBusyStart = {{ fs_busy|tojson }};
  const dcBusyStart = {{ dc_busy|tojson }};
  const progressModal = document.getElementById('memberDeliveryProgressModal');
  const dcStepIds = ['mem-dc-step1', 'mem-dc-step2', 'mem-dc-step3'];
  let dcStepIdx = 0;
  let dcAnimTimer = null;

  function activateDcStep(i) {
    dcStepIds.forEach(function (id, idx) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('active', idx === i);
    });
  }

  if (progressModal && typeof bootstrap !== 'undefined') {
    bootstrap.Modal.getOrCreateInstance(progressModal).show();
    if (dcBusyStart) {
      dcStepIdx = 0;
      activateDcStep(0);
      let elapsed = 0;
      dcAnimTimer = setInterval(function () {
        elapsed += 1;
        if (elapsed % 25 === 0 && dcStepIdx < dcStepIds.length - 1) {
          dcStepIdx++;
          activateDcStep(dcStepIdx);
        }
      }, 1000);
    }
    async function checkDone() {
      try {
        const r = await fetch(statusUrl, { credentials: 'same-origin', headers: { 'Accept': 'application/json' } });
        if (!r.ok) return false;
        const j = await r.json();
        let done = true;
        const fsSt = String(j.fs_status || '').trim();
        const dcSt = String(j.delivered_code_status || '').trim();
        if (fsBusyStart && fsSt === 'generating') done = false;
        if (dcBusyStart && dcSt === 'generating') done = false;
        return done;
      } catch (e) {
        return false;
      }
    }
    checkDone().then(function (done) {
      if (done) {
        if (dcAnimTimer) clearInterval(dcAnimTimer);
        window.location.reload();
      }
    });
    const statusPoll = setInterval(async function () {
      if (await checkDone()) {
        clearInterval(statusPoll);
        if (dcAnimTimer) clearInterval(dcAnimTimer);
        window.location.reload();
      }
    }, 5000);
  }
})();
</script>
{% endif %}
