{# 레거시: 통합 허브는 hub_delivery_generating_bundle + hub_delivery_generating.js 사용. 자동 모달 표시 없음. #}
{% if gen_busy %}
<script>
(function () {
  const statusUrl = '/rfp/' + {{ rfp.id }} + '/paid-generation-status';
  const fsBusyStart = {{ fs_busy|tojson }};
  const dcBusyStart = {{ dc_busy|tojson }};
  async function checkDone() {
    try {
      const r = await fetch(statusUrl, { credentials: 'same-origin', headers: { Accept: 'application/json' } });
      if (!r.ok) return false;
      const j = await r.json();
      const fsSt = String(j.fs_status || '').trim();
      const dcSt = String(j.delivered_code_status || '').trim();
      if (fsBusyStart && fsSt === 'generating') return false;
      if (dcBusyStart && dcSt === 'generating') return false;
      return true;
    } catch (e) {
      return false;
    }
  }
  setInterval(async function () {
    if (await checkDone()) window.location.reload();
  }, 5000);
})();
</script>
{% endif %}
